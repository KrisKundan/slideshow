<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Photo Slideshow</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css?v=2">
</head>
<body>
    <div class="app-container" id="app">
        <header class="app-header">
            <h1>Immersive Slideshow</h1>
            <p>Upload your photos and watch them come to life.</p>
        </header>

        <main class="main-content">
            <div class="upload-zone" id="drop-zone">
                <div class="upload-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-upload-cloud"><polyline points="16 16 12 12 8 16"></polyline><line x1="12" y1="12" x2="12" y2="21"></line><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"></path><polyline points="16 16 12 12 8 16"></polyline></svg>
                </div>
                <h2>Drag & Drop Photos Here</h2>
                <p>or</p>
                <label for="file-input" class="btn-primary">Browse Files</label>
                <input type="file" id="file-input" multiple accept="image/*" class="hidden-input">
            </div>

            <div class="settings-panel">
                <div class="setting-item">
                    <label for="slide-duration">Slide Duration: <span id="duration-val">3</span>s</label>
                    <input type="range" id="slide-duration" min="1" max="15" value="3" step="1">
                </div>
            </div>

            <div class="preview-section hidden" id="preview-section">
                <h3>Selected Photos (<span id="photo-count">0</span>)</h3>
                <div class="gallery-preview" id="gallery-preview"></div>
                
                <div class="action-bar">
                    <button id="start-btn" class="btn-glow">Start Presentation</button>
                    <button id="clear-btn" class="btn-text">Clear All</button>
                </div>
            </div>
        </main>
    </div>

    <!-- Fullscreen Slideshow Container -->
    <div class="slideshow-container hidden" id="slideshow-container">
        <div class="slides-wrapper" id="slides-wrapper">
            <!-- Images will be injected here -->
        </div>
        <button class="exit-btn" id="exit-btn" title="Exit Slideshow">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-x"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
        <div class="controls-hint">Press ESC to exit</div>
    </div>

    <script src="script.js?v=2"></script>
</body>
</html>
